<!DOCTYPE html>
<html lang="pt" style="display: none;"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sarartist | Gestão de Serviços</title>
    
    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://vonvfugrkkvkqcekcwdo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4wzbT3JAJIPkPJZgoB1ipw_RdvBaFxc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- SEGURANÇA MÁXIMA ---
        async function verificarAcessoAdmin() {
            try {
                // 1. Validar utilizador autenticado
                const { data: { user }, error: authError } = await _supabase.auth.getUser();
                
                if (authError || !user) {
                    window.location.replace('login.html');
                    return;
                }

                // 2. Validar cargo de admin na tabela 'perfis'
                const { data: perfil, error: dbError } = await _supabase
                    .from('perfis')
                    .select('tipo_utilizador')
                    .eq('id', user.id)
                    .single();

                if (dbError || !perfil || perfil.tipo_utilizador !== 'admin') {
                    // Se não for admin, logout e expulsa
                    await _supabase.auth.signOut();
                    window.location.replace('index.html');
                } else {
                    // SUCESSO: Revela a página e carrega os serviços
                    document.documentElement.style.display = 'block';
                    carregarServicos();
                }
            } catch (err) {
                window.location.replace('index.html');
            }
        }

        // Dark Mode Instantâneo
        (function() {
            if (localStorage.getItem('sarartist_darkmode') === 'true') {
                document.documentElement.style.backgroundColor = '#121212';
                document.documentElement.style.colorScheme = 'dark';
            }
        })();

        verificarAcessoAdmin();
    </script>

    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/font-awesome.css" rel="stylesheet">
    
    <style>
        .admin-card { transition: all 0.3s ease; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 15px; background: #fff; color: #333; }
        .admin-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .btn-admin-add { background: #f1703a; color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: 600; }
        
        /* Ajuste para Dark Mode */
        [data-colorscheme="dark"] .admin-card { background: #1e1e1e; color: #fff; border-left: 5px solid #f1703a !important; }
    </style>
</head>
<body class="admin-page">

    <main class="admin-main" style="margin-left: 0; padding: 40px;">
        <header class="admin-header d-flex justify-content-between align-items-center mb-5">
            <div>
                <a href="admin-dashboard.html" class="btn btn-sm btn-outline-secondary mb-2">
                    <i class="fa fa-arrow-left"></i> Voltar ao Hub
                </a>
                <div class="d-flex align-items-center">
                    <span style="font-size: 30px; margin-right: 15px;">✂️</span>
                    <h2 class="mb-0">Gestão de Serviços</h2>
                </div>
            </div>
            <button class="btn-admin-add" onclick="abrirModal()">+ Novo Serviço</button>
        </header>

        <section class="admin-tab-content active">
            <div class="row" id="grid-servicos">
                <div class="col-12 text-center p-5">
                    <i class="fa fa-spinner fa-spin fa-2x"></i><br>A carregar serviços...
                </div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="central-modal" style="background: white; padding: 30px; border-radius: 15px; max-width: 450px; width: 90%; margin: auto; position: relative;">
            <button class="btn btn-link text-dark" style="position: absolute; top: 10px; right: 10px; font-size: 24px; text-decoration: none;" onclick="fecharModais()">&times;</button>
            
            <h4 class="mb-4">Novo Serviço</h4>
            
            <div class="form-group mb-3 text-start">
                <label>Nome do Serviço</label>
                <input type="text" id="add-servico-nome" class="form-control" placeholder="Ex: Gelinho com Extensão">
            </div>

            <div class="form-group mb-3 text-start">
                <label>Preço Base (€)</label>
                <input type="number" id="add-servico-preco" class="form-control" step="0.01" placeholder="0.00">
            </div>

            <div class="form-group mb-4 text-start">
                <label>Duração (minutos)</label>
                <input type="number" id="add-servico-duracao" class="form-control" placeholder="Ex: 60">
            </div>

            <button class="btn btn-primary w-100" onclick="gravarServico()">Gravar Serviço</button>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $('#modalOverlay').on('click', function(e) {
                if (e.target === this) fecharModais();
            });
        });

        async function carregarServicos() {
            const { data, error } = await _supabase.from('servicos').select('*').order('nome');
            
            if (error) return console.error(error);

            let html = '';
            data.forEach(s => {
                html += `
                <div class="col-md-4 mb-4">
                    <div class="admin-card p-4 shadow-sm" style="position: relative; border-left: 5px solid #f1703a;">
                        <button class="btn btn-link text-danger" style="position: absolute; top: 10px; right: 10px;" onclick="eliminarServico('${s.id}')">
                            <i class="fa fa-trash"></i>
                        </button>
                        <h4 class="mb-3">${s.nome}</h4>
                        <div class="d-flex justify-content-between align-items-center">
                            <span><i class="fa fa-tag text-muted"></i> <strong>${Number(s.preco_base).toFixed(2)}€</strong></span>
                            <span><i class="fa fa-clock-o text-muted"></i> ${s.duracao_minutos} min</span>
                        </div>
                    </div>
                </div>`;
            });
            $('#grid-servicos').html(html || '<p class="text-center w-100">Sem serviços registados.</p>');
        }

        function abrirModal() { $('#modalOverlay').css('display', 'flex').hide().fadeIn(); }
        function fecharModais() { $('#modalOverlay').fadeOut(); }

        async function gravarServico() {
            const nome = $('#add-servico-nome').val();
            const preco = $('#add-servico-preco').val();
            const duracao = $('#add-servico-duracao').val();

            if(!nome || !preco) return alert("Por favor, preencha o nome e o preço.");

            const { error } = await _supabase
                .from('servicos')
                .insert([{ nome, preco_base: preco, duracao_minutos: duracao }]);

            if (error) {
                alert("Erro: " + error.message);
            } else {
                fecharModais();
                carregarServicos();
                $('#add-servico-nome, #add-servico-preco, #add-servico-duracao').val('');
                alert("Serviço adicionado com sucesso!");
            }
        }

        async function eliminarServico(id) {
            if(confirm("Deseja remover este serviço?")) {
                const { error } = await _supabase.from('servicos').delete().eq('id', id);
                // O Supabase impede o delete se o serviço estiver a ser usado em marcas (Foreign Key)
                if (error) alert("Erro: Não pode apagar serviços que já tenham marcações na agenda.");
                else carregarServicos();
            }
        }
    </script>
</body>
</html>
