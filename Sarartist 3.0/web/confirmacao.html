<!DOCTYPE html>
<html lang="pt">
<head>
    <script>
        // Aplicar dark mode antes de qualquer render para evitar flash
        (function() {
            if (localStorage.getItem('sarartist_darkmode') === 'true') {
                document.documentElement.style.backgroundColor = '#121212';
                document.documentElement.style.colorScheme = 'dark';
            }
        })();
    </script>
    <title>Sarartist | Confirmação - Passo 4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/bootstrap.css" type="text/css" rel="stylesheet" media="all">
    <link href="css/style.css" type="text/css" rel="stylesheet" media="all">
    <link href="css/font-awesome.css" rel="stylesheet">
    
    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="pg-booking">
    <div id="header-placeholder"></div>

    <div class="container" style="margin-top: 180px; margin-bottom: 60px;">
        <div class="booking-container-main">
            <div class="booking-stepper">
                <div class="step-item completed" onclick="window.location.href='marcacao.html'"><div class="step-circle">1</div><span>Serviço</span></div>
                <div class="step-line"></div>
                <div class="step-item completed" onclick="window.location.href='escolher-data.html'"><div class="step-circle">2</div><span>Data e Hora</span></div>
                <div class="step-line"></div>
                <div class="step-item completed" id="step3_link"><div class="step-circle">3</div><span>Personalizar</span></div>
                <div class="step-line"></div>
                <div class="step-item active"><div class="step-circle">4</div><span>Confirmação</span></div>
            </div>

            <h2 class="text-center">Resumo da Marcação</h2>
            
            <div class="row mt-5">
                <div class="col-md-6">
                    <div class="booking-card-white">
                        <h4><i class="fa fa-info-circle"></i> Detalhes</h4>
                        <hr>
                        <p><strong>Serviço:</strong> <span id="resumoServico">-</span></p>
                        <p><strong>Data:</strong> <span id="resumoData">-</span></p>
                        <p><strong>Hora:</strong> <span id="resumoHora">-</span></p>
                        <p id="blocoCor" style="display:none;"><strong>Cor Selecionada:</strong> <span id="resumoCor">-</span></p>
                        <h4 class="mt-4 text-right">Total: <span id="resumoPreco">-</span></h4>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="booking-card-white">
                        <h4><i class="fa fa-user"></i> Seus Dados</h4>
                        <div class="form-group mt-3">
                            <label>Nome Completo</label>
                            <input type="text" id="nomeCliente" class="form-control" placeholder="Ex: Maria Silva">
                        </div>
                        <div class="form-group mt-3">
                            <label>Telemóvel</label>
                            <input type="tel" id="telCliente" class="form-control" placeholder="912 345 678">
                        </div>
                        <button id="btnFinalizar" class="btn-confirmar ready w-100 mt-4" onclick="finalizarReserva()">Confirmar e Gerar Talão</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const SUPABASE_URL = 'https://vonvfugrkkvkqcekcwdo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4wzbT3JAJIPkPJZgoB1ipw_RdvBaFxc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        $(function () {
            $("#header-placeholder").load("header.html");
            $("#footer-placeholder").load("footer.html");

            const servico = localStorage.getItem('servico_nome');
            const data = localStorage.getItem('reserva_data');
            const hora = localStorage.getItem('reserva_hora');
            const preco = localStorage.getItem('servico_preco');
            const cor = localStorage.getItem('escolha_cor_nome');

            $('#resumoServico').text(servico || "-");
            $('#resumoData').text(data || "-");
            $('#resumoHora').text(hora || "-");
            $('#resumoPreco').text((preco || "0") + "€");

            if(cor) {
                $('#blocoCor').show();
                $('#resumoCor').text(cor);
            }

            if(servico !== 'Manicure') {
                $('#step3_link').attr('onclick', 'alert("Este serviço não requer personalização.")');
            } else {
                $('#step3_link').attr('onclick', "window.location.href='personalizar.html'");
            }
        });

        async function finalizarReserva() {
            const nome = $('#nomeCliente').val();
            const tel = $('#telCliente').val();

            if(!nome || !tel) return alert("Por favor, preencha o seu nome e telemóvel.");

            $('#btnFinalizar').prop('disabled', true).text('A processar...');

            const dadosAgendamento = {
                cliente_nome: nome,
                cliente_tel: tel,
                servico_nome: localStorage.getItem('servico_nome'),
                data_reserva: localStorage.getItem('reserva_data'),
                hora_reserva: localStorage.getItem('reserva_hora'),
                cor_escolhida: localStorage.getItem('escolha_cor_nome') || null,
                preco_total: parseFloat(localStorage.getItem('servico_preco'))
            };

            const { data, error } = await _supabase.from('agendamentos').insert([dadosAgendamento]);

            if (error) {
                alert("Erro ao gravar marcação: " + error.message);
                $('#btnFinalizar').prop('disabled', false).text('Confirmar e Gerar Talão');
            } else {
                gerarPDFMarcacao(dadosAgendamento);
                alert("Marcação confirmada com sucesso!");
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }

        function gerarPDFMarcacao(dados) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const brandColor = [241, 112, 58]; // #f1703a

            // Estética do Documento
            doc.setFillColor(brandColor[0], brandColor[1], brandColor[2]);
            doc.rect(0, 0, 210, 40, 'F');
            
            doc.setFontSize(24);
            doc.setTextColor(255, 255, 255);
            doc.text("SARARTIST", 105, 25, { align: 'center' });
            
            doc.setFontSize(10);
            doc.text("COMPROVATIVO DE MARCAÇÃO", 105, 33, { align: 'center' });

            // Detalhes do Cliente
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12);
            doc.text("INFORMAÇÕES DO CLIENTE", 20, 55);
            doc.line(20, 57, 80, 57);
            
            doc.setFontSize(11);
            doc.text(`Nome: ${dados.cliente_nome}`, 20, 65);
            doc.text(`Telemóvel: ${dados.cliente_tel}`, 20, 72);

            // Detalhes da Reserva
            doc.setFontSize(12);
            doc.text("DETALHES DO SERVIÇO", 20, 90);
            doc.line(20, 92, 80, 92);

            doc.setFontSize(11);
            doc.text(`Serviço: ${dados.servico_nome}`, 20, 100);
            doc.text(`Data: ${dados.data_reserva}`, 20, 107);
            doc.text(`Hora: ${dados.hora_reserva}`, 20, 114);
            
            if(dados.cor_escolhida) {
                doc.text(`Cor Selecionada: ${dados.cor_escolhida}`, 20, 121);
            }

            // Total
            doc.setFontSize(16);
            doc.setTextColor(brandColor[0], brandColor[1], brandColor[2]);
            doc.text(`VALOR TOTAL: ${dados.preco_total.toFixed(2)}€`, 20, 140);

            // Informações Adicionais
            doc.setTextColor(100, 100, 100);
            doc.setFontSize(9);
            doc.text("Nota: Por favor, chegue 5 minutos antes da hora marcada.", 20, 160);
            doc.text("Localização: Rua do Girassol nº174, Nine, V.N.Famalicão", 20, 165);

            // Rodapé
            doc.setFontSize(8);
            doc.text("Este documento serve como comprovativo de reserva online.", 105, 285, { align: 'center' });

            doc.save(`Marcacao_Sarartist_${dados.data_reserva}.pdf`);
        }
    </script>
</body>
</html>
