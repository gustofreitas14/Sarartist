<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <script>
        (function() {
            if (localStorage.getItem('sarartist_darkmode') === 'true') {
                document.documentElement.style.backgroundColor = '#121212';
                document.documentElement.style.colorScheme = 'dark';
            }
        })();
    </script>
    <title>Sarartist | Personalizar com Sara AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="pg-personalizar">
    <div id="header-placeholder"></div>

    <div class="container container-main-booking">
        <div class="booking-container-main">
            <div class="booking-stepper">
                <div class="step-item completed" onclick="window.location.href='marcacao.html'"><div class="step-circle">1</div><span>Serviço</span></div>
                <div class="step-line"></div>
                <div class="step-item completed" onclick="window.location.href='escolher-data.html'"><div class="step-circle">2</div><span>Data</span></div>
                <div class="step-line"></div>
                <div class="step-item active"><div class="step-circle">3</div><span>Personalizar</span></div>
                <div class="step-line"></div>
                <div class="step-item"><div class="step-circle">4</div><span>Confirmação</span></div>
            </div>

            <div class="row mt-5">
                <div class="col-md-6 text-center">
                    <div class="hand-wrapper">
                        <img src="images/hand-mask.png" class="hand-image">
                        <img id="nailPatternLayer" src="" style="display: none;">
                        <div id="nailColor" class="nail-color-layer"></div>
                    </div>
                    <h5 class="mt-3 text-muted">Cor: <span id="lblCor">Nenhuma</span> | Padrão: <span id="lblPadrao">Simples</span></h5>
                </div>

                <div class="col-md-6">
                    <div class="booking-card-white">
                        <h4 class="mb-3"><i class="fa fa-paint-brush"></i> 1. Escolha a Cor</h4>
                        <div id="colorGrid" class="d-flex flex-wrap gap-2 mb-4"></div>

                        <h4 class="mb-3"><i class="fa fa-star"></i> 2. Escolha o Desenho</h4>
                        <div id="patternsGrid" class="patterns-grid mb-4"></div>

                        <button id="btnAvancar" class="btn-confirmar ready w-100 mt-4" onclick="validarEContinuar()">
                            Continuar para Confirmação
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="ai-launcher" onclick="toggleChat()">
        <i class="fa fa-magic"></i>
    </div>

    <div id="ai-chat-window">
        <div class="chat-header">
            <span>Sara AI Stylist ✨</span>
            <button class="chat-close-btn" onclick="toggleChat()">&times;</button>
        </div>
        <div id="chat-messages" class="chat-body">
            <div class="msg msg-ai">Olá! Sou a Sara AI. Diz-me: para que ocasião procuras uma manicure hoje? Posso sugerir algo do catálogo! 😊</div>
        </div>
        <div class="chat-footer">
            <input type="text" id="chat-input" placeholder="Ex: Vou a um jantar de gala...">
            <button class="chat-send-btn" onclick="enviarMensagemIA()">
                <i class="fa fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const SUPABASE_URL = 'https://vonvfugrkkvkqcekcwdo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4wzbT3JAJIPkPJZgoB1ipw_RdvBaFxc';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let listaCores = [];
        let listaPadroes = [];

        $(function () {
            $("#header-placeholder").load("header.html");
            $("#footer-placeholder").load("footer.html");
            carregarDadosBD();
            $('#chat-input').keypress(function(e) { if(e.which == 13) enviarMensagemIA(); });
        });

        async function carregarDadosBD() {
            const { data: cores } = await _supabase.from('catalogo_unhas').select('*').eq('disponivel', true);
            listaCores = cores || [];
            const gridC = $('#colorGrid').empty();
            listaCores.forEach(c => {
                gridC.append(`<div class="color-dot" data-nome="${c.nome_cor}" style="background: ${c.hex_code};" onclick="aplicarCor(this, '${c.hex_code}', '${c.nome_cor}')"></div>`);
            });

            const { data: padroes } = await _supabase.from('catalogo_padroes').select('*');
            listaPadroes = padroes || [];
            const gridP = $('#patternsGrid').empty();
            gridP.append(`<div class="pattern-item active" data-nome="Simples" onclick="selecionarPadrao(this, 'Simples', '')"><div>Simples</div></div>`);
            listaPadroes.forEach(p => {
                gridP.append(`<div class="pattern-item" data-nome="${p.nome}" onclick="selecionarPadrao(this, '${p.nome}', '${p.imagem_url}')"><img src="${p.imagem_url}"><div>${p.nome}</div></div>`);
            });
        }

        function aplicarCor(el, hex, nome) {
            $('#nailColor').css('background-color', hex);
            $('.color-dot').removeClass('active');
            $(el).addClass('active');
            $('#lblCor').text(nome);
            localStorage.setItem('escolha_cor_hex', hex);
            localStorage.setItem('escolha_cor_nome', nome);
        }

        function selecionarPadrao(el, nome, url) {
            $('.pattern-item').removeClass('active');
            $(el).addClass('active');
            $('#lblPadrao').text(nome);
            localStorage.setItem('escolha_padrao', nome);
            if(url) { $('#nailPatternLayer').attr('src', url).show(); } else { $('#nailPatternLayer').hide(); }
        }

        function toggleChat() { 
            const win = $('#ai-chat-window');
            win.is(':visible') ? win.fadeOut('fast') : win.fadeIn('fast').css('display', 'flex');
            $('#chat-input').focus();
        }

        async function enviarMensagemIA() {
            const input = $('#chat-input');
            const msg = input.val().trim();
            if(!msg) return;

            addMessage('user', msg);
            input.val('');
            const loadingId = "load-" + Date.now();
            addMessage('ai', '<i class="fa fa-spinner fa-spin"></i> A analisar catálogo...', loadingId);

            try {
                // INVOCA A TUA EDGE FUNCTION (SEGURANÇA TOTAL)
                const { data, error } = await _supabase.functions.invoke('swift-processor', {
                    body: { 
                        prompt: `Tu és a Sara AI, estilista da Sarartist. 
                        Cores: ${listaCores.map(c => c.nome_cor).join(', ')}. 
                        Desenhos: Simples, ${listaPadroes.map(p => p.nome).join(', ')}.
                        Sugere exatamente 1 cor e 1 desenho. Resposta curta. 
                        No fim, usa obrigatoriamente este formato: [APPLY: NomeDaCor | NomeDoDesenho]. Pergunta do cliente: ${msg}` 
                    }
                });

                if (error) throw error;

                let aiTexto = data.candidates[0].content.parts[0].text;
                $(`#${loadingId}`).remove();

                const match = aiTexto.match(/\[APPLY: (.*?) \| (.*?)\]/);
                if(match) {
                    const corSug = match[1].trim();
                    const padSug = match[2].trim();
                    aiTexto = aiTexto.replace(/\[APPLY:.*?\]/, '');
                    addMessage('ai', aiTexto + `<br><button class="ai-action-btn" onclick="iaAplicar('${corSug}', '${padSug}')">Aplicar Sugestão ✨</button>`);
                } else {
                    addMessage('ai', aiTexto);
                }
            } catch (err) { 
                $(`#${loadingId}`).html("Erro ao ligar à Sara AI. Verifica se a Edge Function está ativa."); 
            }
        }

        function addMessage(type, text, id = "") {
            $('#chat-messages').append(`<div id="${id}" class="msg msg-${type}">${text}</div>`);
            $('#chat-messages').scrollTop($('#chat-messages')[0].scrollHeight);
        }

        function iaAplicar(cor, padrao) {
            const cDot = $(`.color-dot[data-nome="${cor}"]`);
            const pDot = $(`.pattern-item[data-nome="${padrao}"]`);
            if(cDot.length) cDot.click();
            if(pDot.length) pDot.click();
        }

        function validarEContinuar() {
            if (!localStorage.getItem('escolha_cor_hex')) return alert("Selecione uma cor.");
            window.location.href = 'confirmacao.html';
        }
    </script>
</body>
</html>
