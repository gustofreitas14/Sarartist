<!DOCTYPE html>
<html lang="pt">

<head>
    <script>
        (function() {
            if (localStorage.getItem('sarartist_darkmode') === 'true') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <title>Sarartist | Personalizar - Passo 3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/bootstrap.css" type="text/css" rel="stylesheet" media="all">
    <link href="css/style.css" type="text/css" rel="stylesheet" media="all">
    <link href="css/font-awesome.css" rel="stylesheet">
    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .patterns-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .pattern-item {
            border: 2px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            flex: 1;
            min-width: 100px;
            transition: 0.3s;
            background: #fff;
            color: #333;
        }

        .pattern-item img {
            width: 100%;
            height: 60px;
            object-fit: contain;
            margin-bottom: 5px;
            border-radius: 4px;
        }

        .pattern-item.active {
            border-color: #f1703a;
            background: #fff5f0;
            color: #f1703a;
        }

        .hand-wrapper {
            position: relative;
            width: 100%;
        }

        .hand-image {
            position: relative;
            z-index: 3;
            width: 100%;
            display: block;
        }

        .nail-color-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: background 0.3s;
        }

        #nailPatternLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            object-fit: contain;
        }

        .upload-box {
            border: 2px dashed #f1703a;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            background: #fafafa;
        }

        .hidden-input {
            display: none;
        }

        .preview-upload {
            max-width: 100px;
            margin-top: 10px;
            border-radius: 5px;
            display: none;
        }

        /* --- ESTILOS SARA AI --- */
        #ai-launcher {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #f1703a;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        #ai-chat-window {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 320px;
            height: 400px;
            background: white;
            border-radius: 10px;
            display: none;
            flex-direction: column;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            overflow: hidden;
        }

        .chat-header {
            background: #f1703a;
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .chat-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f9f9f9;
            font-size: 14px;
        }

        .chat-footer {
            padding: 10px;
            display: flex;
            border-top: 1px solid #eee;
        }

        .chat-footer input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 5px 10px;
            outline: none;
        }

        .msg {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 80%;
        }

        .msg-ai {
            background: #eee;
            align-self: flex-start;
        }

        .msg-user {
            background: #f1703a;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }

        .ai-action-btn {
            background: #333;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 5px;
        }
    </style>
</head>

<body class="pg-personalizar">
    <div id="header-placeholder"></div>

    <div class="container container-main-booking">
        <div class="booking-container-main">
            <div class="booking-stepper">
                <div class="step-item completed" onclick="window.location.href='marcacao.html'">
                    <div class="step-circle">1</div><span>Serviço</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item completed" onclick="window.location.href='escolher-data.html'">
                    <div class="step-circle">2</div><span>Data e Hora</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item active" id="step3">
                    <div class="step-circle">3</div><span>Personalizar</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item" id="step4">
                    <div class="step-circle">4</div><span>Confirmação</span>
                </div>
            </div>

            <div class="row mt-5">
                <div class="col-md-6">
                    <div class="nail-preview-container">
                        <div class="hand-wrapper">
                            <img src="images/hand-mask.png" class="hand-image">
                            <img id="nailPatternLayer" src="">
                            <div id="nailColor" class="nail-color-layer"></div>
                        </div>
                        <p class="text-center mt-2" id="lblSelecao">Nenhuma cor selecionada</p>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="booking-card-white">
                        <h4 class="mb-3"><i class="fa fa-paint-brush"></i> 1. Escolha a Cor</h4>
                        <div id="colorGrid"></div>
                        <hr>
                        <h4 class="mb-3"><i class="fa fa-star"></i> 2. Escolha o Desenho</h4>
                        <div id="patternsGrid" class="patterns-grid">
                            <div class="text-center w-100 p-3"><i class="fa fa-spinner fa-spin"></i> A carregar
                                desenhos...</div>
                        </div>
                        <div id="areaUpload" class="upload-box" style="display:none;">
                            <p>Envie-nos a sua imagem de inspiração:</p>
                            <label class="btn-confirmar"
                                style="background:#333; cursor:pointer; display: inline-block; padding: 10px; color: white;">
                                <i class="fa fa-upload"></i> Selecionar Foto
                                <input type="file" id="inputFoto" class="hidden-input" accept="image/*"
                                    onchange="previewImagem(this)">
                            </label>
                            <img id="imgPreview" class="preview-upload">
                        </div>
                        <button id="btnAvancar" class="btn-confirmar ready w-100 mt-4" onclick="validarEContinuar()">
                            Continuar para Confirmação
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="ai-launcher" onclick="toggleChat()">
        <i class="fa fa-magic"></i>
    </div>
    <div id="ai-chat-window">
        <div class="chat-header">
            <span>✨ Sara AI Stylist</span>
            <span style="cursor:pointer" onclick="toggleChat()">&times;</span>
        </div>
        <div id="chat-messages" class="chat-body" style="display: flex; flex-direction: column;">
            <div class="msg msg-ai">Olá! Eu sou a Sara. Diz-me a ocasião e eu sugiro a cor e o padrão ideais do nosso
                catálogo!</div>
        </div>
        <div class="chat-footer">
            <input type="text" id="chat-input" placeholder="Ex: Vou a um jantar...">
            <button onclick="enviarMensagemIA()" style="border:none; background:none; color:#f1703a;"><i
                    class="fa fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const SUPABASE_URL = 'https://vonvfugrkkvkqcekcwdo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4wzbT3JAJIPkPJZgoB1ipw_RdvBaFxc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let listaCores = [];
        let listaPadroes = [];

        $(function () {
            $("#header-placeholder").load("header.html");
            $("#footer-placeholder").load("footer.html");
            carregarCoresBD();
            carregarPadroesBD();
            localStorage.setItem('escolha_padrao', 'Simples');
        });

        async function carregarCoresBD() {
            const { data: cores, error } = await _supabase.from('catalogo_unhas').select('*').eq('disponivel', true);
            if (error) return;
            listaCores = cores;
            const grid = $('#colorGrid').empty();
            cores.forEach(c => {
                grid.append(`<div class="color-dot" data-nome="${c.nome_cor}" style="background: ${c.hex_code};" title="${c.nome_cor}" onclick="aplicarCor(this, '${c.hex_code}', '${c.nome_cor}')"></div>`);
            });
        }

        async function carregarPadroesBD() {
            const { data: padroes, error } = await _supabase.from('catalogo_padroes').select('*').eq('disponivel', true);
            if (error) return;
            listaPadroes = padroes;
            const grid = $('#patternsGrid').empty();
            grid.append(`<div class="pattern-item active" data-nome="Simples" onclick="selecionarPadrao(this, 'Simples', '')"><div style="height:60px; display:flex; align-items:center; justify-content:center;"><i class="fa fa-ban fa-2x"></i></div><div>Simples</div></div>`);
            padroes.forEach(p => {
                grid.append(`<div class="pattern-item" data-nome="${p.nome}" onclick="selecionarPadrao(this, '${p.nome}', '${p.imagem_url}')"><img src="${p.imagem_url}"><div>${p.nome}</div></div>`);
            });
            grid.append(`<div class="pattern-item" data-nome="Personalizado" onclick="selecionarPadrao(this, 'Personalizado', '')"><div style="height:60px; display:flex; align-items:center; justify-content:center;"><i class="fa fa-camera fa-2x"></i></div><div>O meu desenho</div></div>`);
        }

        function aplicarCor(elemento, hex, nome) {
            $('#nailColor').css('background-color', hex);
            $('.color-dot').removeClass('active');
            $(elemento).addClass('active');
            localStorage.setItem('escolha_cor_hex', hex);
            localStorage.setItem('escolha_cor_nome', nome);
            $('#lblSelecao').text(nome + " - " + (localStorage.getItem('escolha_padrao') || 'Simples'));
        }

        function selecionarPadrao(elemento, padrao, imgUrl) {
            $('.pattern-item').removeClass('active');
            $(elemento).addClass('active');
            localStorage.setItem('escolha_padrao', padrao);
            const patternLayer = $('#nailPatternLayer');
            if (padrao === 'Personalizado') {
                $('#areaUpload').fadeIn();
                patternLayer.hide();
            } else {
                $('#areaUpload').fadeOut();
                if (imgUrl && padrao !== 'Simples') { patternLayer.attr('src', imgUrl).show(); }
                else { patternLayer.hide(); }
            }
            $('#lblSelecao').text((localStorage.getItem('escolha_cor_nome') || 'Cor') + " - " + padrao);
        }

        // --- FUNÇÕES SARA AI ---
        function toggleChat() { $('#ai-chat-window').fadeToggle(200); }

        async function enviarMensagemIA() {
            const input = $('#chat-input');
            const msg = input.val().trim();
            if (!msg) return;

            $('#chat-messages').append(`<div class="msg msg-user">${msg}</div>`);
            $('#chat-messages').scrollTop($('#chat-messages')[0].scrollHeight);
            input.val('');

            try {
                console.log("A enviar para a Sara...");

                // Construir prompt com contexto do catálogo
                const coresDisponiveis = listaCores.map(c => c.nome_cor).join(', ');
                const padroesDisponiveis = ['Simples', ...listaPadroes.map(p => p.nome), 'Personalizado'].join(', ');

                const promptCompleto = `És a Sara AI, estilista da Sarartist, um salão de beleza português.
Catálogo de cores disponíveis: ${coresDisponiveis}
Desenhos disponíveis: ${padroesDisponiveis}
A cliente diz: "${msg}"
Responde em português de Portugal, de forma simpática e breve (máximo 3 frases).
Sugere EXATAMENTE 1 cor e 1 desenho do catálogo acima.
No final inclui OBRIGATORIAMENTE esta linha: [APLICAR: NomeDaCor | NomeDoDesenho]`;

                const { data, error } = await _supabase.functions.invoke('Sara-IA', {
                    body: { prompt: promptCompleto }
                });

                if (error) throw error;

                console.log("Resposta recebida:", data);

                const respostaCompleta = data.resposta || "A Sara está tímida hoje...";

                // Detetar sugestão [APLICAR: Cor | Desenho]
                const match = respostaCompleta.match(/\[APLICAR:\s*(.+?)\s*\|\s*(.+?)\]/i);
                let textoLimpo = respostaCompleta.replace(/\[APLICAR:.*?\]/i, '').trim();

                if (match) {
                    const corSug = match[1].trim();
                    const padSug = match[2].trim();
                    $('#chat-messages').append(`<div class="msg msg-ai">${textoLimpo}<br><br><button class="ai-action-btn" onclick="aplicarSugestaoIA('${corSug}', '${padSug}')">✨ Aplicar: ${corSug} + ${padSug}</button></div>`);
                } else {
                    $('#chat-messages').append(`<div class="msg msg-ai">${textoLimpo}</div>`);
                }

            } catch (err) {
                console.error("Erro detalhado:", err);
                $('#chat-messages').append(`<div class="msg msg-ai">Tive um problema ao ligar à Sara. Verifica a consola!</div>`);
            }
        }

        function aplicarSugestaoIA(cor, padrao) {
            $(`.color-dot[data-nome*="${cor}"]`).click();
            $(`.pattern-item[data-nome*="${padrao}"]`).click();
            toggleChat();
        }

        function previewImagem(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => $('#imgPreview').attr('src', e.target.result).show();
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function validarEContinuar() {
            // ... manter a tua lógica de validação original ...
            window.location.href = 'confirmacao.html';
        }
    </script>
</body>

</html>
