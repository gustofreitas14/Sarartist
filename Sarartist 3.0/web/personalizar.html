<!DOCTYPE html>
<html lang="pt">
<head>
    <script>
        (function() {
            if (localStorage.getItem('sarartist_darkmode') === 'true') {
                document.documentElement.style.backgroundColor = '#121212';
                document.documentElement.style.colorScheme = 'dark';
            }
        })();
    </script>
    <title>Sarartist | Personalizar - Passo 3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/bootstrap.css" type="text/css" rel="stylesheet" media="all">
    <link href="css/style.css" type="text/css" rel="stylesheet" media="all">
    <link href="css/font-awesome.css" rel="stylesheet">
    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .patterns-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .pattern-item { 
            border: 2px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; 
            text-align: center; flex: 1; min-width: 100px; transition: 0.3s;
            background: #fff; color: #333;
        }
        .pattern-item img { width: 100%; height: 60px; object-fit: contain; margin-bottom: 5px; border-radius: 4px; }
        .pattern-item.active { border-color: #f1703a; background: #fff5f0; color: #f1703a; }
        
        /* Estilo para as camadas da mão */
        .hand-wrapper { position: relative; width: 100%; }
        .hand-image { position: relative; z-index: 3; width: 100%; display: block; }
        .nail-color-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1; transition: background 0.3s; 
        }
        #nailPatternLayer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 2; pointer-events: none; object-fit: contain;
        }

        .upload-box { 
            border: 2px dashed #f1703a; padding: 20px; border-radius: 8px; 
            margin-top: 15px; text-align: center; background: #fafafa;
        }
        .hidden-input { display: none; }
        .preview-upload { max-width: 100px; margin-top: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body class="pg-personalizar">
    <div id="header-placeholder"></div>

    <div class="container container-main-booking">
        <div class="booking-container-main">
            <div class="booking-stepper">
                <div class="step-item completed" onclick="window.location.href='marcacao.html'">
                    <div class="step-circle">1</div><span>Serviço</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item completed" onclick="window.location.href='escolher-data.html'">
                    <div class="step-circle">2</div><span>Data e Hora</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item active" id="step3">
                    <div class="step-circle">3</div><span>Personalizar</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item" id="step4">
                    <div class="step-circle">4</div><span>Confirmação</span>
                </div>
            </div>

            <div class="row mt-5">
                <div class="col-md-6">
                    <div class="nail-preview-container">
                        <div class="hand-wrapper">
                            <img src="images/hand-mask.png" class="hand-image">
                            <img id="nailPatternLayer" src="">
                            <div id="nailColor" class="nail-color-layer"></div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="booking-card-white">
                        <h4 class="mb-3"><i class="fa fa-paint-brush"></i> 1. Escolha a Cor</h4>
                        <div id="colorGrid"></div>

                        <hr>

                        <h4 class="mb-3"><i class="fa fa-star"></i> 2. Escolha o Desenho</h4>
                        <div id="patternsGrid" class="patterns-grid">
                            <div class="text-center w-100 p-3"><i class="fa fa-spinner fa-spin"></i> A carregar desenhos...</div>
                        </div>

                        <div id="areaUpload" class="upload-box" style="display:none;">
                            <p>Envie-nos a sua imagem de inspiração:</p>
                            <label class="btn-confirmar" style="background:#333; cursor:pointer;">
                                <i class="fa fa-upload"></i> Selecionar Foto
                                <input type="file" id="inputFoto" class="hidden-input" accept="image/*" onchange="previewImagem(this)">
                            </label>
                            <img id="imgPreview" class="preview-upload">
                        </div>

                        <button id="btnAvancar" class="btn-confirmar ready w-100 mt-4" onclick="validarEContinuar()">
                            Continuar para Confirmação
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const SUPABASE_URL = 'https://vonvfugrkkvkqcekcwdo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4wzbT3JAJIPkPJZgoB1ipw_RdvBaFxc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        $(function () {
            $("#header-placeholder").load("header.html");
            $("#footer-placeholder").load("footer.html");
            
            carregarCoresBD();
            carregarPadroesBD();
            
            localStorage.setItem('escolha_padrao', 'Simples');
            localStorage.removeItem('escolha_imagem_url');
        });

        async function carregarCoresBD() {
            const { data: cores, error } = await _supabase.from('catalogo_unhas').select('*').eq('disponivel', true);
            if (error) return $('#colorGrid').html('<p>Erro ao carregar cores.</p>');
            const grid = $('#colorGrid').empty();
            cores.forEach(c => {
                grid.append(`<div class="color-dot" style="background: ${c.hex_code};" title="${c.nome_cor}" onclick="aplicarCor(this, '${c.hex_code}', '${c.nome_cor}')"></div>`);
            });
        }

        async function carregarPadroesBD() {
            const { data: padroes, error } = await _supabase.from('catalogo_padroes').select('*').eq('disponivel', true);
            if (error) return $('#patternsGrid').html('<p>Erro ao carregar desenhos.</p>');

            const grid = $('#patternsGrid').empty();
            
            // Opção Padrão: Simples
            grid.append(`
                <div class="pattern-item active" onclick="selecionarPadrao(this, 'Simples', '')">
                    <div style="height:60px; display:flex; align-items:center; justify-content:center;"><i class="fa fa-ban fa-2x"></i></div>
                    <div>Simples</div>
                </div>
            `);

            // Padrões da Base de Dados
            padroes.forEach(p => {
                grid.append(`
                    <div class="pattern-item" onclick="selecionarPadrao(this, '${p.nome}', '${p.imagem_url}')">
                        <img src="${p.imagem_url}">
                        <div>${p.nome}</div>
                    </div>
                `);
            });

            // Opção Padrão: Personalizado
            grid.append(`
                <div class="pattern-item" onclick="selecionarPadrao(this, 'Personalizado', '')">
                    <div style="height:60px; display:flex; align-items:center; justify-content:center;"><i class="fa fa-camera fa-2x"></i></div>
                    <div>O meu desenho</div>
                </div>
            `);
        }

        function aplicarCor(elemento, hex, nome) {
            $('#nailColor').css('background-color', hex);
            $('.color-dot').removeClass('active');
            $(elemento).addClass('active');
            localStorage.setItem('escolha_cor_hex', hex);
            localStorage.setItem('escolha_cor_nome', nome);
        }

        function selecionarPadrao(elemento, padrao, imgUrl) {
            $('.pattern-item').removeClass('active');
            $(elemento).addClass('active');
            localStorage.setItem('escolha_padrao', padrao);

            const patternLayer = $('#nailPatternLayer');

            if (padrao === 'Personalizado') {
                $('#areaUpload').fadeIn();
                patternLayer.hide().attr('src', '');
            } else {
                $('#areaUpload').fadeOut();
                if (imgUrl && padrao !== 'Simples') {
                    patternLayer.attr('src', imgUrl).show();
                } else {
                    patternLayer.hide().attr('src', '');
                }
            }
        }

        function previewImagem(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => $('#imgPreview').attr('src', e.target.result).show();
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function validarEContinuar() {
            const padrao = localStorage.getItem('escolha_padrao');
            const file = $('#inputFoto')[0].files[0];

            if (!localStorage.getItem('escolha_cor_hex')) {
                return alert("Por favor, selecione uma cor primeiro.");
            }

            if (padrao === 'Personalizado') {
                if (!file) return alert("Por favor, envie uma imagem para o seu desenho personalizado.");
                $('#btnAvancar').prop('disabled', true).text('A carregar imagem...');
                const uploadURL = await subirParaStorage(file);
                if (uploadURL) {
                    localStorage.setItem('escolha_imagem_url', uploadURL);
                    window.location.href = 'confirmacao.html';
                } else {
                    $('#btnAvancar').prop('disabled', false).text('Continuar');
                }
            } else {
                window.location.href = 'confirmacao.html';
            }
        }

        async function subirParaStorage(file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_inspiração.${fileExt}`;
            const filePath = `clientes/${fileName}`;
            const { data, error } = await _supabase.storage.from('unhas-personalizadas').upload(filePath, file);
            if (error) { alert("Erro no upload: " + error.message); return null; }
            const { data: urlData } = _supabase.storage.from('unhas-personalizadas').getPublicUrl(filePath);
            return urlData.publicUrl;
        }
    </script>
</body>
</html>
