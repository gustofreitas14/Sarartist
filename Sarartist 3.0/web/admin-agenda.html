<!DOCTYPE html>
<html lang="pt" style="display: none;"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sarartist | Gestão de Agenda</title>
    
    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/font-awesome.css" rel="stylesheet">
    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://vonvfugrkkvkqcekcwdo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4wzbT3JAJIPkPJZgoB1ipw_RdvBaFxc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- SEGURANÇA MÁXIMA ---
        async function verificarAcessoAdmin() {
            try {
                const { data: { user }, error: authError } = await _supabase.auth.getUser();
                if (authError || !user) {
                    window.location.replace('login.html');
                    return;
                }

                const { data: perfil, error: dbError } = await _supabase
                    .from('perfis')
                    .select('tipo_utilizador')
                    .eq('id', user.id)
                    .single();

                if (dbError || !perfil || perfil.tipo_utilizador !== 'admin') {
                    window.location.replace('index.html');
                } else {
                    document.documentElement.style.display = 'block';
                    carregarAgendamentos();
                    configurarRealtime();
                }
            } catch (err) {
                window.location.replace('index.html');
            }
        }

        // Aplicar dark mode imediato
        (function() {
            if (localStorage.getItem('sarartist_darkmode') === 'true') {
                document.documentElement.style.backgroundColor = '#121212';
                document.documentElement.style.colorScheme = 'dark';
            }
        })();

        verificarAcessoAdmin();
    </script>
</head>
<body class="admin-page">

    <main class="admin-main" style="margin-left: 0; padding: 40px;">
        <header class="admin-header d-flex justify-content-between align-items-center mb-5">
            <div>
                <a href="admin-dashboard.html" class="btn btn-sm btn-outline-secondary mb-2">
                    <i class="fa fa-arrow-left"></i> Voltar ao Hub
                </a>
                <h2>📅 Agenda de Marcações</h2>
            </div>
            <div id="user-info" class="text-right">
                <strong>Sara Freitas</strong><br>
                <small class="text-success">Modo Administração</small>
            </div>
        </header>

        <section id="tab-agenda" class="admin-tab-content active">
            <div class="admin-card">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead style="background: #f8f9fa;">
                            <tr>
                                <th>Cliente</th>
                                <th>Serviço</th>
                                <th>Data/Hora</th>
                                <th>Design Escolhido</th> <th>Estado</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-agendamentos">
                            <tr>
                                <td colspan="6" class="text-center p-5">
                                    <i class="fa fa-spinner fa-spin fa-2x mb-3"></i><br>
                                    A carregar agenda...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="modalImagem" class="modal" style="display:none; position:fixed; z-index:9999; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; cursor:pointer;" onclick="$(this).fadeOut()">
        <img id="imgFull" src="" style="max-width:90%; max-height:90%; border:5px solid white; border-radius:10px;">
    </div>

    <script>
        async function carregarAgendamentos() {
            const { data, error } = await _supabase
                .from('agendamentos')
                .select('*')
                .order('data_reserva', { ascending: true })
                .order('hora_reserva', { ascending: true });

            if (error) {
                console.error("Erro:", error);
                return;
            }

            let html = '';
            if (data && data.length > 0) {
                data.forEach(item => {
                    // Lógica para Cor e Padrão
                    const corHtml = item.unha_cor ? 
                        `<div class="d-flex align-items-center gap-2 mb-1">
                            <span style="background:${item.unha_cor}; width:12px; height:12px; border-radius:50%; border:1px solid #ddd; display:inline-block;"></span>
                            <small>${item.unha_cor}</small>
                        </div>` : '';

                    const padraoHtml = item.unha_padrao ? 
                        `<div class="mb-1"><i class="fa fa-star text-warning"></i> <small>${item.unha_padrao}</small></div>` : '';

                    const inspiraçãoHtml = item.unha_imagem_url ? 
                        `<button class="btn btn-xs btn-outline-primary" style="font-size:10px; padding:2px 5px;" onclick="verImagem('${item.unha_imagem_url}')">
                            <i class="fa fa-image"></i> Ver Foto
                         </button>` : '';

                    html += `
                    <tr>
                        <td>
                            <strong>${item.cliente_nome}</strong><br>
                            <small class="text-muted"><i class="fa fa-phone"></i> ${item.cliente_tel}</small>
                        </td>
                        <td><span class="badge" style="background: #eef2ff; color: #4f46e5; border: 1px solid #c7d2fe;">${item.servico_nome}</span></td>
                        <td>
                            <small><i class="fa fa-calendar"></i> ${formatarData(item.data_reserva)}</small><br>
                            <strong><i class="fa fa-clock-o"></i> ${item.hora_reserva.substring(0,5)}</strong>
                        </td>
                        <td>
                            ${corHtml}
                            ${padraoHtml}
                            ${inspiraçãoHtml}
                        </td>
                        <td>
                            <span style="padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; background: ${item.pago ? '#dcfce7' : '#fef9c3'}; color: ${item.pago ? '#166534' : '#854d0e'}">
                                ${item.pago ? 'PAGO' : 'PENDENTE'}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-light" onclick="eliminarAgendamento('${item.id}')">
                                <i class="fa fa-trash text-danger"></i>
                            </button>
                        </td>
                    </tr>`;
                });
            } else {
                html = '<tr><td colspan="6" class="text-center p-4">Não existem marcações registadas.</td></tr>';
            }
            $('#lista-agendamentos').html(html);
        }

        function verImagem(url) {
            $('#imgFull').attr('src', url);
            $('#modalImagem').css('display', 'flex').hide().fadeIn();
        }

        function formatarData(dataStr) {
            const d = dataStr.split('-');
            return `${d[2]}/${d[1]}/${d[0]}`;
        }

        async function eliminarAgendamento(id) {
            if(confirm("Deseja cancelar esta marcação?")) {
                const { error } = await _supabase.from('agendamentos').delete().eq('id', id);
                if (error) alert("Erro: " + error.message);
                else carregarAgendamentos();
            }
        }

        function configurarRealtime() {
            _supabase.channel('agenda-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'agendamentos' }, () => {
                carregarAgendamentos();
            }).subscribe();
        }
    </script>
</body>
</html>
