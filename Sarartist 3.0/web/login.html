<!DOCTYPE html>
<html lang="pt">
<head>
    <script>
        (function() {
            if (localStorage.getItem('sarartist_darkmode') === 'true') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <title>Sarartist | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/auth-modals.css" rel="stylesheet">
    <link href="css/font-awesome.css" rel="stylesheet">
    
    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="images/Sarartist-new.png" alt="Logo">
            </div>
            <h3>Bem-vinda de volta</h3>
            <div class="auth-form">
                
                <div id="step-1-login">
                    <div class="auth-group">
                        <label>E-mail</label>
                        <input type="email" id="email" placeholder="">
                    </div>
                    <div class="auth-group">
                        <label>Palavra-passe</label>
                        <div style="position: relative;">
                            <input type="password" id="password" style="padding-right: 45px;">
                            <button type="button" onclick="togglePassword('password', 'iconPass')" 
                                style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#999; padding:0;">
                                <i class="fa fa-eye" id="iconPass"></i>
                            </button>
                        </div>
                    </div>
                    <button id="btnLogin" class="btn-auth-submit" onclick="handleLogin()">Entrar</button>
                    
                    <div style="display:flex; align-items:center; margin: 20px 0; gap: 10px;">
                        <hr style="flex:1; margin:0; border-color:#eee;">
                        <span style="color:#aaa; font-size:13px;">ou</span>
                        <hr style="flex:1; margin:0; border-color:#eee;">
                    </div>

                    <button onclick="loginComGoogle()" style="width:100%; padding:12px; border:1.5px solid #ddd; border-radius:30px; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; font-size:15px; color:#333; transition:0.3s;" onmouseover="this.style.borderColor='#e91e63'" onmouseout="this.style.borderColor='#ddd'">
                        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                        Continuar com Google
                    </button>
                    
                    <p class="auth-switch">Esqueceu-se da senha? <a href="javascript:void(0)" onclick="abrirModalRecuperar()">Recuperar</a></p>
                    <p class="auth-switch">Não tem conta? <a href="registo.html">Registar</a></p>
                </div>

                <div id="step-2-mfa" style="display: none;">
                    <p style="text-align: center; margin-bottom: 20px; font-size: 0.9em; color: #666;">
                        A sua conta está protegida. Insira o código de 6 dígitos gerado pela sua aplicação de autenticação.
                    </p>
                    <div class="auth-group">
                        <label>Código MFA</label>
                        <input type="text" id="mfa-code" placeholder="Ex: 123456" maxlength="6" style="text-align: center; letter-spacing: 5px; font-size: 1.2rem;">
                    </div>
                    <button id="btnMfa" class="btn-auth-submit" onclick="verificarMFA()">Verificar Código</button>
                    <p class="auth-switch mt-3"><a href="javascript:void(0)" onclick="cancelarLogin()" style="color: #999;">Cancelar e voltar</a></p>
                </div>

            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalRecuperar">
        <div class="central-modal">
            <h4>Recuperar Senha</h4>
            <p>Introduza o seu e-mail para receber um código de 6 dígitos.</p>
            <div class="auth-group text-left" style="margin-top: 15px;">
                <input type="email" id="email-recuperar" class="form-control" style="padding: 10px; border: 1px solid #ddd;">
            </div>
            <button id="btnEnviarCodigo" class="btn-auth-submit-modal mt-3" onclick="enviarCodigoRecuperacao()">Enviar Código</button>
            <button class="btn-cancelar" onclick="fecharModalRecuperar()">Cancelar</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vonvfugrkkvkqcekcwdo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4wzbT3JAJIPkPJZgoB1ipw_RdvBaFxc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let factorIdAtual = null;

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function loginComGoogle() {
            const { error } = await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/index.html'
                }
            });
            if (error) alert("Erro ao ligar com Google: " + error.message);
        }

        function abrirModalRecuperar() { $('#modalRecuperar').addClass('active'); }
        function fecharModalRecuperar() { $('#modalRecuperar').removeClass('active'); }

        async function handleLogin() {
            const email = $('#email').val();
            const password = $('#password').val();

            if(!email || !password) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            $('#btnLogin').prop('disabled', true).text('A entrar...');

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert("Erro: " + error.message);
                $('#btnLogin').prop('disabled', false).text('Entrar');
                return;
            }

            const { data: aalData, error: aalError } = await _supabase.auth.mfa.getAuthenticatorAssuranceLevel();
            
            if (aalData?.nextLevel === 'aal2' && aalData?.nextLevel !== aalData?.currentLevel) {
                const factorsData = await _supabase.auth.mfa.listFactors();
                if (factorsData.data?.totp?.length > 0) {
                    factorIdAtual = factorsData.data.totp[0].id; 
                    $('#step-1-login').hide();
                    $('#step-2-mfa').show();
                    $('#mfa-code').focus();
                } else {
                    verificarTipoUtilizador(data.user.id);
                }
            } else {
                verificarTipoUtilizador(data.user.id);
            }
        }

        async function verificarMFA() {
            const code = $('#mfa-code').val().trim();
            if (code.length !== 6) return alert("O código deve ter 6 dígitos.");

            $('#btnMfa').prop('disabled', true).text('A verificar...');

            try {
                const challenge = await _supabase.auth.mfa.challenge({ factorId: factorIdAtual });
                if (challenge.error) throw challenge.error;

                const verify = await _supabase.auth.mfa.verify({
                    factorId: factorIdAtual,
                    challengeId: challenge.data.id,
                    code: code
                });

                if (verify.error) throw verify.error;

                const { data: userData } = await _supabase.auth.getUser();
                verificarTipoUtilizador(userData.user.id);

            } catch (err) {
                alert("Erro: " + err.message);
                $('#btnMfa').prop('disabled', false).text('Verificar Código');
            }
        }

async function verificarTipoUtilizador(userId) {
    // O Supabase às vezes demora milissegundos a propagar a sessão
    // por isso usamos este pequeno delay
    setTimeout(async () => {
        const { data, error } = await _supabase
            .from('perfis')
            .select('tipo_utilizador') // Garante que pedimos apenas esta coluna
            .eq('id', userId)
            .single();

        if (error) {
            console.error("Erro RLS:", error.message);
            // Se der erro aqui, o problema é que o RLS ainda não permite a leitura
            return;
        }

        if (data && data.tipo_utilizador === 'admin') {
            window.location.href = 'admin-dashboard.html';
        } else {
            window.location.href = 'index.html';
        }
    }, 500); 
}

        async function cancelarLogin() {
            await _supabase.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
