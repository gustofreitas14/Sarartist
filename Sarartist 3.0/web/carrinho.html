<!DOCTYPE html>
<html lang="pt">
<head>
    <script>
        // Aplicar dark mode antes de qualquer render para evitar flash
        (function() {
            if (localStorage.getItem('sarartist_darkmode') === 'true') {
                document.documentElement.style.backgroundColor = '#121212';
                document.documentElement.style.colorScheme = 'dark';
            }
        })();
    </script>
    <title>Sarartist | Finalizar Compra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/font-awesome.css" rel="stylesheet">
    
    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-light">
    <div id="header-placeholder"></div>

    <section class="checkout-section">
        <div class="container">
            <div class="row">
                <div class="col-lg-7">
                    <div class="checkout-card">
                        <h4><i class="fa fa-user"></i> Identificação</h4>
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label>Nome Completo *</label>
                                <input type="text" id="c-nome" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Telemóvel *</label>
                                <input type="tel" id="c-tel" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>E-mail *</label>
                                <input type="email" id="c-email" class="form-control" required>
                            </div>
                        </div>
                    </div>

                    <div class="checkout-card">
                        <h4><i class="fa fa-truck"></i> Entrega</h4>
                        <label class="method-option">
                            <input type="radio" name="entrega" value="levantamento" checked onchange="toggleMorada()">
                            <span class="checkmark"></span>
                            <span class="method-content">Levantamento em Loja (Grátis)</span>
                        </label>
                        <label class="method-option">
                            <input type="radio" name="entrega" value="envio" onchange="toggleMorada()">
                            <span class="checkmark"></span>
                            <span class="method-content">Envio p/ Transportadora (+4.50€)</span>
                        </label>

                        <div id="seccao-morada" style="display:none; margin-top: 20px;">
                            <label>Morada Completa</label>
                            <input type="text" id="c-morada" class="form-control mb-2" placeholder="Rua, nº, andar...">
                            <div class="row">
                                <div class="col-6"><input type="text" id="c-cp" class="form-control" placeholder="Cód. Postal"></div>
                                <div class="col-6"><input type="text" id="c-cidade" class="form-control" placeholder="Cidade"></div>
                            </div>
                        </div>
                    </div>

                    <div class="checkout-card">
                        <h4><i class="fa fa-credit-card"></i> Pagamento</h4>
                        <label class="method-option">
                            <input type="radio" name="pagamento" value="MB WAY" checked>
                            <span class="checkmark"></span>
                            <span class="method-content">MB WAY</span>
                        </label>
                        <label class="method-option">
                            <input type="radio" name="pagamento" value="Transferência">
                            <span class="checkmark"></span>
                            <span class="method-content">Referência Multibanco / Transferência</span>
                        </label>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="checkout-card sticky-top" style="top: 100px;">
                        <h4>Resumo</h4>
                        <div id="lista-resumo" class="mb-3"></div>
                        <div class="summary-item"><span>Subtotal:</span> <span id="val-subtotal">0.00€</span></div>
                        <div class="summary-item"><span>Portes:</span> <span id="val-portes">0.00€</span></div>
                        <div class="summary-item mt-2 border-top pt-2">
                            <strong>Total:</strong>
                            <strong class="total-final" id="val-total">0.00€</strong>
                        </div>
                        <button class="btn-finish" id="btn-finalizar" onclick="processarPedido()">
                            Confirmar e Gerar Fatura PDF
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script>
        $(document).ready(function() {
            $("#header-placeholder").load("header.html", () => $('.w3header').addClass('scrolled'));
            $("#footer-placeholder").load("footer.html");
            renderizarResumo();
        });

        function renderizarResumo() {
            const carrinho = JSON.parse(localStorage.getItem('sarartist_carrinho')) || [];
            if(carrinho.length === 0) return window.location.href = 'loja.html';

            let html = '';
            let subtotal = 0;
            carrinho.forEach(item => {
                const sub = item.preco * item.quantidade;
                subtotal += sub;
                html += `<div class="d-flex justify-content-between small">
                            <span>${item.quantidade}x ${item.nome}</span>
                            <span>${sub.toFixed(2)}€</span>
                         </div>`;
            });

            $('#lista-resumo').html(html);
            $('#val-subtotal').text(subtotal.toFixed(2) + '€');
            atualizarTotal(subtotal);
        }

        function toggleMorada() {
            const isEnvio = $('input[name="entrega"]:checked').val() === 'envio';
            $('#seccao-morada').toggle(isEnvio);
            renderizarResumo(); 
        }

        function atualizarTotal(subtotal) {
            const portes = $('input[name="entrega"]:checked').val() === 'envio' ? 4.50 : 0;
            $('#val-portes').text(portes === 0 ? 'Grátis' : portes.toFixed(2) + '€');
            $('#val-total').text((subtotal + portes).toFixed(2) + '€');
        }

        async function processarPedido() {
            const nome = $('#c-nome').val();
            const email = $('#c-email').val();
            const tel = $('#c-tel').val();

            if(!nome || !email || !tel) return alert("Por favor, preencha os campos obrigatórios!");

            $('#btn-finalizar').prop('disabled', true).text('A gerar fatura...');

            try {
                const carrinho = JSON.parse(localStorage.getItem('sarartist_carrinho'));
                const dadosPDF = {
                    nome, email, tel,
                    metodo: $('input[name="pagamento"]:checked').val(),
                    entrega: $('input[name="entrega"]:checked').val(),
                    morada: $('#c-morada').val() || "Levantamento em Loja",
                    itens: carrinho,
                    total: $('#val-total').text(),
                    portes: $('#val-portes').text(),
                    subtotal: $('#val-subtotal').text()
                };

                gerarFaturaPDF(dadosPDF);

                alert("Encomenda confirmada! O seu comprovativo PDF foi gerado.");
                localStorage.removeItem('sarartist_carrinho');
                window.location.href = 'index.html';

            } catch (error) {
                console.error(error);
                alert("Erro ao processar pedido.");
                $('#btn-finalizar').prop('disabled', false).text('Confirmar e Gerar Fatura PDF');
            }
        }

        function gerarFaturaPDF(dados) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Configuração de Cores (Sarartist Orange: #f1703a)
            const brandColor = [241, 112, 58];

            // Cabeçalho
            doc.setFontSize(22);
            doc.setTextColor(brandColor[0], brandColor[1], brandColor[2]);
            doc.text("SARARTIST", 105, 20, { align: 'center' });
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text("Estética & Bem-Estar", 105, 27, { align: 'center' });
            doc.text("Nine, V.N. Famalicão | Tel: 912 531 408", 105, 32, { align: 'center' });

            doc.setDrawColor(brandColor[0], brandColor[1], brandColor[2]);
            doc.line(15, 38, 195, 38);

            // Dados do Cliente
            doc.setFontSize(12);
            doc.setTextColor(0);
            doc.text("DADOS DA ENCOMENDA", 15, 50);
            doc.setFontSize(10);
            doc.text(`Cliente: ${dados.nome}`, 15, 58);
            doc.text(`Telemóvel: ${dados.tel}`, 15, 63);
            doc.text(`Data: ${new Date().toLocaleDateString()}`, 15, 68);
            doc.text(`Pagamento: ${dados.metodo}`, 15, 73);
            doc.text(`Entrega: ${dados.morada}`, 15, 78);

            // Tabela de Produtos
            const colunas = ["Produto", "Qtd", "Preço Un.", "Subtotal"];
            const linhas = dados.itens.map(item => [
                item.nome,
                item.quantidade,
                `${item.preco.toFixed(2)}€`,
                `${(item.preco * item.quantidade).toFixed(2)}€`
            ]);

            doc.autoTable({
                startY: 85,
                head: [colunas],
                body: linhas,
                headStyles: { fillColor: brandColor },
                theme: 'striped'
            });

            // Totais
            const finalY = doc.lastAutoTable.finalY + 10;
            doc.text(`Subtotal: ${dados.subtotal}`, 140, finalY);
            doc.text(`Portes: ${dados.portes}`, 140, finalY + 5);
            doc.setFontSize(14);
            doc.text(`TOTAL: ${dados.total}`, 140, finalY + 15);

            // Notas de Pagamento
            if(dados.metodo === "MB WAY") {
                doc.setFontSize(9);
                doc.setTextColor(brandColor[0], brandColor[1], brandColor[2]);
                doc.text("Por favor, envie o comprovativo MB WAY para o número 912 531 408", 15, finalY + 30);
            }

            // Rodapé
            doc.setFontSize(8);
            doc.setTextColor(150);
            doc.text("Obrigado pela sua preferência!", 105, 285, { align: 'center' });

            doc.save(`Encomenda_Sarartist_${Date.now()}.pdf`);
        }
    </script>
</body>
</html>
