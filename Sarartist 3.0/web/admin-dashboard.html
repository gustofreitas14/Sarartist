<!DOCTYPE html>
<html lang="pt">
<head>
    <script>
        // 1. Aplicar dark mode imediato
        (function() {
            if (localStorage.getItem('sarartist_darkmode') === 'true') {
                document.documentElement.style.backgroundColor = '#121212';
                document.documentElement.style.colorScheme = 'dark';
            }
        })();
    </script>
    <title>Sarartist | Admin Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/font-awesome.css" rel="stylesheet">
    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Esconde a página por defeito para segurança */
        body { display: none; }
        .admin-page-active { display: block !important; }

        .admin-card { transition: all 0.3s ease; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 15px; }
        .admin-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 9999;
        }
    </style>
</head>
<body class="admin-page">
    <main class="admin-main" style="margin-left: 0; padding: 40px;">
        <header class="admin-header d-flex justify-content-between align-items-center">
            <h2>Olá, Sara! O que vamos gerir hoje?</h2>
            <div class="header-buttons">
                <a href="index.html" class="btn btn-outline-primary me-2">
                    <i class="fa fa-eye"></i> Visualizar Site
                </a>
                <button class="btn btn-outline-danger" onclick="handleLogout()">
                    <i class="fa fa-sign-out"></i> Sair
                </button>
            </div>
        </header>

        <div class="row mt-5">
            <div class="col-md-3 mb-4">
                <div class="admin-card text-center p-5 hvr-grow" onclick="window.location.href='admin-agenda.html'" style="cursor:pointer">
                    <i class="fa fa-calendar fa-4x mb-3" style="color: #E1306C;"></i>
                    <h4>Agenda</h4>
                    <p class="text-muted">Ver e gerir marcações</p>
                </div>
            </div>

            <div class="col-md-3 mb-4">
                <div class="admin-card text-center p-5 hvr-grow" onclick="window.location.href='admin-servicos.html'" style="cursor:pointer">
                    <i class="fa fa-cut fa-4x mb-3" style="color: #E1306C;"></i>
                    <h4>Serviços</h4>
                    <p class="text-muted">Preços e durações</p>
                </div>
            </div>

            <div class="col-md-3 mb-4">
                <div class="admin-card text-center p-5 hvr-grow" onclick="window.location.href='admin-cores.html'" style="cursor:pointer">
                    <i class="fa fa-paint-brush fa-4x mb-3" style="color: #E1306C;"></i>
                    <h4>Cores</h4>
                    <p class="text-muted">Paleta de cores disponível</p>
                </div>
            </div>

            <div class="col-md-3 mb-4">
                <div class="admin-card text-center p-5 hvr-grow" onclick="abrirModalPadrao()" style="cursor:pointer; border: 2px dashed #E1306C;">
                    <i class="fa fa-star fa-4x mb-3" style="color: #E1306C;"></i>
                    <h4>Desenhos PNG</h4>
                    <p class="text-muted">Adicionar padrões à mão</p>
                </div>
            </div>

            <div class="col-md-3 mb-4">
                <div class="admin-card text-center p-5 hvr-grow" onclick="window.location.href='admin-produtos.html'" style="cursor:pointer">
                    <i class="fa fa-shopping-bag fa-4x mb-3" style="color: #E1306C;"></i>
                    <h4>Loja</h4>
                    <p class="text-muted">Gerir stock e produtos</p>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalNovoPadrao">
        <div class="central-modal" style="background: white; padding: 30px; border-radius: 15px; max-width: 450px; width: 90%; margin: auto;">
            <h4 class="mb-4">Novo Desenho para o Modelo</h4>
            <div class="auth-form text-start">
                <div class="form-group mb-3">
                    <label>Nome do Padrão</label>
                    <input type="text" id="nomePadrao" class="form-control" placeholder="Ex: Flores Brancas">
                </div>
                <div class="form-group mb-3">
                    <label>Ficheiro PNG (Transparente)</label>
                    <input type="file" id="filePadrao" class="form-control" accept="image/png">
                </div>
                <button id="btnSalvarPadrao" class="btn btn-primary w-100 mt-3" onclick="salvarNovoPadrao()">
                    <i class="fa fa-save"></i> Guardar no Catálogo
                </button>
                <button class="btn btn-link w-100 mt-2 text-muted" onclick="$('#modalNovoPadrao').hide()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vonvfugrkkvkqcekcwdo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4wzbT3JAJIPkPJZgoB1ipw_RdvBaFxc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- TRANCA DE SEGURANÇA ADMIN ---
        async function protegerPagina() {
            const { data: { user } } = await _supabase.auth.getUser();

            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const { data, error } = await _supabase
                .from('perfis')
                .select('tipo_utilizador')
                .eq('id', user.id)
                .single();

            if (error || !data || data.tipo_utilizador !== 'admin') {
                alert("Acesso Negado: Esta área é reservada para a Sara.");
                window.location.href = 'index.html';
            } else {
                // Se for admin, mostra a página
                document.body.classList.add('admin-page-active');
            }
        }

        // Executar proteção imediatamente
        protegerPagina();

        function abrirModalPadrao() {
            $('#modalNovoPadrao').css('display', 'flex');
        }

        async function salvarNovoPadrao() {
            const nome = $('#nomePadrao').val();
            const file = $('#filePadrao')[0].files[0];

            if (!nome || !file) return alert("Por favor, preencha o nome e selecione um PNG.");

            $('#btnSalvarPadrao').prop('disabled', true).text('A carregar...');

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `padrao_${Date.now()}.${fileExt}`;
                const filePath = `catalogo/${fileName}`;

                const { error: uploadError } = await _supabase.storage
                    .from('unhas-personalizadas')
                    .upload(filePath, file);

                if (uploadError) throw uploadError;

                const { data: urlData } = _supabase.storage.from('unhas-personalizadas').getPublicUrl(filePath);
                
                const { error: dbError } = await _supabase.from('catalogo_padroes').insert([
                    { nome: nome, imagem_url: urlData.publicUrl, disponivel: true }
                ]);

                if (dbError) throw dbError;

                alert("Sucesso! O padrão já aparece na personalização.");
                location.reload();

            } catch (err) {
                alert("Erro: " + err.message);
                $('#btnSalvarPadrao').prop('disabled', false).text('Guardar no Catálogo');
            }
        }

        async function handleLogout() {
            if(confirm("Deseja mesmo sair da área administrativa?")) {
                await _supabase.auth.signOut();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
