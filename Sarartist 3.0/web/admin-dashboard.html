<!DOCTYPE html>
<html lang="pt" style="display: none;"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sarartist | Admin Hub</title>
    
    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://vonvfugrkkvkqcekcwdo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_4wzbT3JAJIPkPJZgoB1ipw_RdvBaFxc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- SEGURANÇA MÁXIMA: VERIFICAÇÃO DE CARGO REAL ---
        async function validarAcessoAdmin() {
            try {
                // 1. Verificar se existe utilizador autenticado
                const { data: { user }, error: userError } = await _supabase.auth.getUser();
                
                if (userError || !user) {
                    window.location.replace('login.html');
                    return;
                }

                // 2. Consultar a base de dados para confirmar se é ADMIN
                const { data: perfil, error: perfilError } = await _supabase
                    .from('perfis')
                    .select('tipo_utilizador')
                    .eq('id', user.id)
                    .single();

                if (perfilError || !perfil || perfil.tipo_utilizador !== 'admin') {
                    // SE NÃO FOR ADMIN: Logout forçado por segurança e redireciona
                    await _supabase.auth.signOut();
                    window.location.replace('index.html');
                } else {
                    // SUCESSO: É a Sara. Revelamos o dashboard.
                    document.documentElement.style.display = 'block';
                }
            } catch (err) {
                console.error("Erro de segurança:", err);
                window.location.replace('index.html');
            }
        }

        // Executar validação antes de carregar o resto da página
        validarAcessoAdmin();

        // Dark Mode
        (function() {
            if (localStorage.getItem('sarartist_darkmode') === 'true') {
                document.documentElement.style.backgroundColor = '#121212';
                document.documentElement.style.colorScheme = 'dark';
            }
        })();
    </script>

    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/font-awesome.css" rel="stylesheet">
    
    <style>
        .admin-card { transition: all 0.3s ease; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 15px; background: #fff; color: #333; }
        .admin-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .btn-logout { border-radius: 50px; padding: 8px 20px; font-weight: 600; }
        
        /* Ajuste para Dark Mode no Card */
        [data-colorscheme="dark"] .admin-card { background: #1e1e1e; color: #fff; }
    </style>
</head>
<body class="admin-page">
    <main class="admin-main" style="padding: 40px;">
        <header class="admin-header d-flex justify-content-between align-items-center mb-5">
            <h2>Olá, Sara! Gestão Administrativa</h2>
            <div class="header-buttons">
                <a href="index.html" class="btn btn-outline-primary me-2">
                    <i class="fa fa-eye"></i> Ver Site
                </a>
                <button class="btn btn-danger btn-logout" onclick="handleLogout()">
                    <i class="fa fa-sign-out"></i> Sair
                </button>
            </div>
        </header>

        <div class="row">
            <div class="col-md-3 mb-4">
                <div class="admin-card text-center p-5 hvr-grow" onclick="window.location.href='admin-agenda.html'" style="cursor:pointer">
                    <i class="fa fa-calendar fa-4x mb-3" style="color: #E1306C;"></i>
                    <h4>Agenda</h4>
                    <p class="text-muted">Marcações Ativas</p>
                </div>
            </div>

            <div class="col-md-3 mb-4">
                <div class="admin-card text-center p-5 hvr-grow" onclick="window.location.href='admin-cores.html'" style="cursor:pointer">
                    <i class="fa fa-paint-brush fa-4x mb-3" style="color: #E1306C;"></i>
                    <h4>Cores</h4>
                    <p class="text-muted">Catálogo de Verniz</p>
                </div>
            </div>

            <div class="col-md-3 mb-4">
                <div class="admin-card text-center p-5 hvr-grow" onclick="abrirModalPadrao()" style="cursor:pointer; border: 2px dashed #E1306C;">
                    <i class="fa fa-star fa-4x mb-3" style="color: #E1306C;"></i>
                    <h4>Novo Desenho</h4>
                    <p class="text-muted">Subir PNG para a mão</p>
                </div>
            </div>

            <div class="col-md-3 mb-4">
                <div class="admin-card text-center p-5 hvr-grow" onclick="window.location.href='admin-produtos.html'" style="cursor:pointer">
                    <i class="fa fa-shopping-bag fa-4x mb-3" style="color: #E1306C;"></i>
                    <h4>Loja</h4>
                    <p class="text-muted">Stock e Vendas</p>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalNovoPadrao">
        <div class="central-modal" style="background: white; padding: 30px; border-radius: 15px; max-width: 450px; width: 90%; margin: auto;">
            <h4 class="mb-4">Adicionar PNG ao Catálogo</h4>
            <div class="form-group mb-3 text-start">
                <label>Nome do Desenho</label>
                <input type="text" id="nomePadrao" class="form-control" placeholder="Ex: Flores Brancas">
            </div>
            <div class="form-group mb-3 text-start">
                <label>Ficheiro PNG Transparente</label>
                <input type="file" id="filePadrao" class="form-control" accept="image/png">
            </div>
            <button id="btnSalvarPadrao" class="btn btn-primary w-100 mt-3" onclick="salvarNovoPadrao()">Guardar Desenho</button>
            <button class="btn btn-link w-100 mt-2 text-muted" onclick="$('#modalNovoPadrao').hide()">Cancelar</button>
        </div>
    </div>

    <script>
        function abrirModalPadrao() {
            $('#modalNovoPadrao').css('display', 'flex').hide().fadeIn();
        }

        async function salvarNovoPadrao() {
            const nome = $('#nomePadrao').val();
            const file = $('#filePadrao')[0].files[0];

            if (!nome || !file) return alert("Preencha todos os campos.");
            if (file.type !== "image/png") return alert("Por favor, selecione apenas ficheiros PNG.");

            $('#btnSalvarPadrao').prop('disabled', true).text('A carregar...');

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `padrao_${Date.now()}.${fileExt}`;
                const filePath = `catalogo/${fileName}`;

                const { error: uploadError } = await _supabase.storage
                    .from('unhas-personalizadas')
                    .upload(filePath, file);

                if (uploadError) throw uploadError;

                const { data: urlData } = _supabase.storage.from('unhas-personalizadas').getPublicUrl(filePath);
                
                const { error: dbError } = await _supabase.from('catalogo_padroes').insert([
                    { nome: nome, imagem_url: urlData.publicUrl, disponivel: true }
                ]);

                if (dbError) throw dbError;

                alert("Desenho adicionado com sucesso!");
                location.reload();
            } catch (err) {
                alert("Erro: " + err.message);
                $('#btnSalvarPadrao').prop('disabled', false).text('Guardar Desenho');
            }
        }

        async function handleLogout() {
            if(confirm("Deseja mesmo sair?")) {
                await _supabase.auth.signOut();
                window.location.replace('login.html');
            }
        }
    </script>
</body>
</html>
