<!DOCTYPE html>
<html lang="pt">
<head>
    <script>
        (function() {
            if (localStorage.getItem('sarartist_darkmode') === 'true') {
                document.documentElement.style.backgroundColor = '#121212';
                document.documentElement.style.colorScheme = 'dark';
            }
        })();
    </script>
    <title>Sarartist | Marcações - Passo 1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/bootstrap.css" type="text/css" rel="stylesheet" media="all">
    <link href="css/style.css" type="text/css" rel="stylesheet" media="all">
    <link href="css/font-awesome.css" rel="stylesheet">
    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background: #fff5f8;">
    <div id="header-placeholder"></div>

    <div class="container" style="margin-top: 140px; margin-bottom: 60px;">
        <div class="booking-container-main">
            <div class="booking-stepper">
                <div class="step-item active" onclick="window.location.href='marcacao.html'">
                    <div class="step-circle">1</div>
                    <span>Serviço</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item" id="step2" onclick="irParaData()">
                    <div class="step-circle">2</div>
                    <span>Data e Hora</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item" id="step3" onclick="irParaPersonalizacao()">
                    <div class="step-circle">3</div>
                    <span>Personalizar</span>
                </div>
            </div>

            <h2 class="text-center mb-5">Selecione o Serviço</h2>
            
            <div id="lista-servicos" class="row">
                <div class="col-12 text-center">
                    <i class="fa fa-spinner fa-spin fa-2x" style="color: #f1703a;"></i>
                    <p>A carregar serviços...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const _supabase = supabase.createClient('https://vonvfugrkkvkqcekcwdo.supabase.co', 'sb_publishable_4wzbT3JAJIPkPJZgoB1ipw_RdvBaFxc');

        // VERIFICAÇÃO DE ACESSO
        async function verificarAcesso() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                alert("Por favor, inicie sessão para realizar uma marcação.");
                window.location.href = 'login.html';
            } else {
                carregarServicos();
            }
        }

        $(function () {
            verificarAcesso();
            $("#header-placeholder").load("header.html");
            $("#footer-placeholder").load("footer.html");
        });

        async function carregarServicos() {
            try {
                const { data: servicos, error } = await _supabase.from('servicos').select('*').order('nome');
                
                if (error) throw error;

                const container = $('#lista-servicos').empty();
                servicos.forEach(s => {
                    container.append(`
                        <div class="col-md-4 mb-4">
                            <div class="service-card-selectable" onclick="selecionarServico('${s.nome}', '${s.duracao_minutos}', '${s.preco_base}')">
                                <div class="service-icon"><i class="fa fa-heartbeat"></i></div>
                                <h4>${s.nome}</h4>
                                <p>${s.duracao_minutos} min | ${s.preco_base}€</p>
                            </div>
                        </div>
                    `);
                });
            } catch (err) {
                console.error(err);
                $('#lista-servicos').html('<p class="text-center text-danger">Erro ao carregar serviços. Verifique as políticas RLS.</p>');
            }
        }

        function selecionarServico(nome, duracao, preco) {
            localStorage.setItem('servico_nome', nome);
            localStorage.setItem('servico_duracao', duracao);
            localStorage.setItem('servico_preco', preco);
            
            $('.service-card-selectable').removeClass('active');
            $(event.currentTarget).addClass('active');
            
            setTimeout(() => { window.location.href = 'escolher-data.html'; }, 300);
        }

        function irParaData() {
            if(localStorage.getItem('servico_nome')) {
                window.location.href = 'escolher-data.html';
            } else {
                alert("Por favor, selecione um serviço primeiro.");
            }
        }

        function irParaPersonalizacao() {
            alert("Selecione primeiro o serviço, a data e a hora.");
        }
    </script>
</body>
</html>
