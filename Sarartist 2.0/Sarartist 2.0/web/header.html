            <a href="javascript:void(0)" onclick="handleUserLogout()" style="color: #d9534f !important;">

<div id="drawerOverlay" class="drawer-overlay" style="z-index: 9998;"></div>

<script>
    // Inicialização do Supabase
    const _headerSupabase = supabase.createClient('https://vonvfugrkkvkqcekcwdo.supabase.co', 'sb_publishable_4wzbT3JAJIPkPJZgoB1ipw_RdvBaFxc');

    // SOLUÇÃO PARA O CLIQUE: Usar o (document).on para capturar cliques em elementos dinâmicos
    $(document).ready(function() {
        
        // Remove eventos antigos e adiciona novos para evitar duplicados
        $(document).off('click', '#openMenu').on('click', '#openMenu', function(e) {
            e.preventDefault();
            e.stopPropagation();
            console.log("Menu Hamburger clicado!"); // Aparece na consola (F12) para teste
            $('#sideDrawer').addClass('open');
            $('#drawerOverlay').addClass('active');
        });

        $(document).off('click', '#closeMenu, #drawerOverlay').on('click', '#closeMenu, #drawerOverlay', function(e) {
            e.preventDefault();
            $('#sideDrawer').removeClass('open');
            $('#drawerOverlay').removeClass('active');
        });

        verificarSessaoNoMenu();
    });

    async function verificarSessaoNoMenu() {
        const { data: { session } } = await _headerSupabase.auth.getSession();
        if (session) {
            $('#menu-logout-item').show();
        }
    }

    async function handleUserLogout() {
        if(confirm("Deseja mesmo terminar a sua sessão?")) {
            const { error } = await _headerSupabase.auth.signOut();
            if (!error) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }
    }
</script>
